# Kitty Config — Gruvbox Dark + XL Mono
# https://sw.kovidgoyal.net/kitty/conf/

# Font
font_family XL Mono
font_size 12

# Cursor
cursor #fabd2f
cursor_text_color #282828
cursor_shape beam

# Gruvbox Dark Colors
background #282828
foreground #ebdbb2
selection_background #458588
selection_foreground #282828

# ANSI 16-color palette
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2

# Window / Tab
window_padding_width 2
window_margin_width 0
hide_window_decorations no
remember_window_size yes
initial_window_width  140c
initial_window_height 40c

# Scrollback
scrollback_lines 100000

# Mouse
mouse_hide_wait 3.0

# Tab bar style (powerline)
tab_bar_style powerline
tab_powerline_style slanted
active_tab_background #458588
active_tab_foreground #282828
inactive_tab_background #3c3836
inactive_tab_foreground #a89984
tab_bar_background #282828

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Pane splits — match iTerm2 behavior
# Cmd+D  = Split Vertically  → two panes side-by-side (左右分屏)
# Cmd+Shift+D = Split Horizontally → two panes stacked (上下分屏)
map cmd+d launch --location=vsplit
map cmd+shift+d launch --location=hsplit

# Pane navigation (vim-style)
map cmd+h neighboring_window left
map cmd+j neighboring_window bottom
map cmd+k neighboring_window top
map cmd+l neighboring_window right

# Quick zoom current pane
map cmd+z toggle_layout stack

# Close pane
map cmd+w close_window

# New tab / close tab
map cmd+t new_tab
map cmd+w close_window

# Tab switching
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Copy / Paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Open URL
map ctrl+shift+o open_url_with_hints
