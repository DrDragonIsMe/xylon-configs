# =============================================
# 基础优化
# =============================================
# 前缀键：Ctrl+a（更符合人体工学，无需扭腕）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 降低输入延迟，提升响应速度
set -sg escape-time 10
set -g repeat-time 600

# 窗口/面板编号从 1 开始，更符合键盘布局
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 加大历史记录
set -g history-limit 50000

# 启用鼠标：滚动、调整面板大小、点击选择
set -g mouse on

# 终端真彩色支持
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 自动聚焦事件（vim/neoivm 等编辑器需要）
set -g focus-events on

# 根据当前活动客户端调整窗口大小
setw -g aggressive-resize on

# =============================================
# 键位映射（Vim 风格）
# =============================================
setw -g mode-keys vi

# 分割面板并保持当前路径
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# 面板导航
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 快速调整面板大小（prefix 后按住可重复）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 窗口切换（prefix 后按住可重复）
bind -r n next-window
bind -r p previous-window

# 快速移动窗口位置
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# 重载配置
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 关闭面板/窗口无需确认
bind x kill-pane
bind X kill-window

# =============================================
# 复制模式（Vi 风格 + macOS 剪贴板集成）
# =============================================
set -s copy-command 'pbcopy'

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# 双击复制单词，三击复制行
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T root DoubleClick1Pane select-pane \; copy-mode \; send-keys -X select-word \; send-keys -X copy-selection-and-cancel
bind-key -T root TripleClick1Pane select-pane \; copy-mode \; send-keys -X select-line \; send-keys -X copy-selection-and-cancel

# =============================================
# 状态栏（简洁现代，透明背景）
# =============================================
set -g status on
set -g status-interval 1
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

set -g status-style bg=default,fg=default
set -g status-left "#[fg=green,bold]#{session_name} #[fg=brightblack]│ "
set -g status-right "#[fg=cyan]%H:%M #[fg=brightblack]│ #[fg=yellow]%Y-%m-%d #[fg=brightblack]│ #[fg=blue]#{host_short}"

# 窗口状态
set -g window-status-format "#[fg=brightblack]#{window_index}:#{window_name}#{?window_flags,#{window_flags},}"
set -g window-status-current-format "#[fg=white,bold]#{window_index}:#{window_name}#{?window_flags,#{window_flags},}"
set -g window-status-separator "  "

# 消息样式
set -g message-style bg=default,fg=yellow,bold
set -g mode-style bg=brightblack,fg=white

# 面板边框
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=blue

# =============================================
# 通知
# =============================================
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

